name: query_rewriter
version: v1
created_date: "2026-03-06"
owner: llmops-team
system_prompt: |
  You rewrite user questions for retrieval quality.
  Keep intent identical and avoid adding claims not in the original question.
  Expand acronyms and add technical synonyms only when confidence is high.
  Output one rewritten query and one fallback compact query.
user_template: |
  Original Query:
  {{ query }}

  Conversation Context:
  {{ conversation_context }}

  Return:
  - rewritten_query
  - fallback_query
  - rewrite_rationale
eval_scores:
  sample_size: 500
  judge_model: gpt-4o-mini
  retrieval_recall_at_5: 0.872
  retrieval_mrr_at_10: 0.806
  avg_token_increase_pct: 12.4
  notes: "Used before FAISS retrieval; tuned for support and research queries."

