apiVersion: v1
kind: Namespace
metadata:
  name: llmops
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: llmops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: llmops
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: llmops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: llmops-research-assistant:latest
          imagePullPolicy: IfNotPresent
          command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
          env:
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: SHARD_AGGREGATOR_URL
              value: http://shard-aggregator:8100
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llmops-secrets
                  key: openai_api_key
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: llmops
spec:
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: llmops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: llmops-research-assistant:latest
          imagePullPolicy: IfNotPresent
          command: ["celery", "-A", "api.batch.celery_app", "worker", "--loglevel=info"]
          env:
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llmops-secrets
                  key: openai_api_key
