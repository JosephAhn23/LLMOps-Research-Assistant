apiVersion: apps/v1
kind: Deployment
metadata:
  name: shard-0
  namespace: llmops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shard-0
  template:
    metadata:
      labels:
        app: shard-0
    spec:
      containers:
        - name: shard
          image: llmops-research-assistant:latest
          imagePullPolicy: IfNotPresent
          command: ["uvicorn", "api.shard_server:app", "--host", "0.0.0.0", "--port", "8101"]
          env:
            - name: SHARD_ID
              value: "0"
            - name: SHARDS_PATH
              value: /app/data/shards
          ports:
            - containerPort: 8101
---
apiVersion: v1
kind: Service
metadata:
  name: shard-0
  namespace: llmops
spec:
  selector:
    app: shard-0
  ports:
    - port: 8101
      targetPort: 8101
---
