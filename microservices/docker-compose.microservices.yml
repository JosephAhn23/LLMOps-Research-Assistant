version: "3.9"

# Microservices stack — distributed version of the LLMOps pipeline.
# Each pipeline stage runs as an independent service.
#
# Usage:
#   docker compose -f microservices/docker-compose.microservices.yml up
#
# The existing docker-compose.yml stays for local monolith mode.

x-common-env: &common-env
  OPENAI_API_KEY: ${OPENAI_API_KEY}
  MLFLOW_TRACKING_URI: http://mlflow:5000
  REDIS_URL: redis://redis:6379/0
  KAFKA_BROKERS: kafka:9092

x-build: &build
  build:
    context: ..
    dockerfile: infra/dockerfiles/Dockerfile
  restart: unless-stopped
  networks:
    - llmops-net

services:
  # ---------------------------------------------------------------------------
  # API Gateway — routes requests to all downstream services
  # ---------------------------------------------------------------------------
  gateway:
    <<: *build
    command: python -c "import uvicorn; from microservices.microservices import create_gateway; uvicorn.run(create_gateway(), host='0.0.0.0', port=8000)"
    ports: ["8000:8000"]
    environment:
      <<: *common-env
      SERVICE: gateway
      PORT: "8000"
      RETRIEVAL_SVC_URL: http://retrieval:8001
      RERANKER_SVC_URL: http://reranker:8002
      SYNTHESIZER_SVC_URL: http://synthesizer:8003
      SAFETY_SVC_URL: http://safety:8004
      EVALUATION_SVC_URL: http://evaluation:8005
      MULTIMODAL_SVC_URL: http://multimodal:8006
    depends_on:
      retrieval:
        condition: service_healthy
      reranker:
        condition: service_healthy
      safety:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # Retrieval Service
  # ---------------------------------------------------------------------------
  retrieval:
    <<: *build
    command: python -c "import uvicorn; from microservices.microservices import create_retrieval_service; uvicorn.run(create_retrieval_service(), host='0.0.0.0', port=8001)"
    ports: ["8001:8001"]
    environment:
      <<: *common-env
      SERVICE: retrieval
      PORT: "8001"
    volumes:
      - ../faiss_index:/app/faiss_index
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # Reranker Service
  # ---------------------------------------------------------------------------
  reranker:
    <<: *build
    command: python -c "import uvicorn; from microservices.microservices import create_reranker_service; uvicorn.run(create_reranker_service(), host='0.0.0.0', port=8002)"
    ports: ["8002:8002"]
    environment:
      <<: *common-env
      SERVICE: reranker
      PORT: "8002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # Synthesizer Service (LLM generation)
  # ---------------------------------------------------------------------------
  synthesizer:
    <<: *build
    command: uvicorn api.main:app --host 0.0.0.0 --port 8003
    ports: ["8003:8003"]
    environment:
      <<: *common-env
      SERVICE: synthesizer
      PORT: "8003"
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT}
      AZURE_OPENAI_KEY: ${AZURE_OPENAI_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # Safety Service
  # ---------------------------------------------------------------------------
  safety:
    <<: *build
    command: python -c "import uvicorn; from microservices.microservices import create_safety_service; uvicorn.run(create_safety_service(), host='0.0.0.0', port=8004)"
    ports: ["8004:8004"]
    environment:
      <<: *common-env
      SERVICE: safety
      PORT: "8004"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # Evaluation Service (RAGAS scoring)
  # ---------------------------------------------------------------------------
  evaluation:
    <<: *build
    command: uvicorn mlops.evaluate:app --host 0.0.0.0 --port 8005
    ports: ["8005:8005"]
    environment:
      <<: *common-env
      SERVICE: evaluation
      PORT: "8005"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # Multimodal Service (CLIP + LLaVA + Stable Diffusion) — GPU required
  # ---------------------------------------------------------------------------
  multimodal:
    <<: *build
    command: uvicorn multimodal.multimodal_pipeline:app --host 0.0.0.0 --port 8006
    ports: ["8006:8006"]
    environment:
      <<: *common-env
      SERVICE: multimodal
      PORT: "8006"
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 60s
      timeout: 30s
      retries: 3

  # ---------------------------------------------------------------------------
  # FAISS shards + aggregator
  # ---------------------------------------------------------------------------
  shard-0:
    <<: *build
    environment:
      SHARD_ID: "0"
    ports: ["8010:8001"]
    command: uvicorn infra.distributed_faiss_service:shard_app --host 0.0.0.0 --port 8001

  shard-1:
    <<: *build
    environment:
      SHARD_ID: "1"
    ports: ["8011:8001"]
    command: uvicorn infra.distributed_faiss_service:shard_app --host 0.0.0.0 --port 8001

  shard-2:
    <<: *build
    environment:
      SHARD_ID: "2"
    ports: ["8012:8001"]
    command: uvicorn infra.distributed_faiss_service:shard_app --host 0.0.0.0 --port 8001

  shard-3:
    <<: *build
    environment:
      SHARD_ID: "3"
    ports: ["8013:8001"]
    command: uvicorn infra.distributed_faiss_service:shard_app --host 0.0.0.0 --port 8001

  aggregator:
    <<: *build
    ports: ["8005:8000"]
    environment:
      SHARD_URLS: "http://shard-0:8001,http://shard-1:8001,http://shard-2:8001,http://shard-3:8001"
    depends_on: [shard-0, shard-1, shard-2, shard-3]
    command: uvicorn infra.distributed_faiss_service:aggregator_app --host 0.0.0.0 --port 8000

  # ---------------------------------------------------------------------------
  # Celery workers
  # ---------------------------------------------------------------------------
  worker-default:
    <<: *build
    environment:
      <<: *common-env
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A api.batch.celery_app worker -Q default --loglevel=info --concurrency=4

  worker-priority:
    <<: *build
    environment:
      <<: *common-env
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A api.batch.celery_app worker -Q high_priority --loglevel=info --concurrency=8

  flower:
    image: mher/flower:2.0
    ports: ["5555:5555"]
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    command: celery flower --broker=redis://redis:6379/0 --port=5555
    networks: [llmops-net]

  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    networks: [llmops-net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks: [llmops-net]

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks: [llmops-net]
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.0
    ports: ["5000:5000"]
    command: mlflow server --host 0.0.0.0 --port 5000
    networks: [llmops-net]

networks:
  llmops-net:
    driver: bridge
