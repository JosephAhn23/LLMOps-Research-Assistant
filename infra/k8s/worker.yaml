apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: llmops
spec:
  replicas: 4
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      containers:
        - name: worker
          image: llmops-research-assistant:latest
          command:
            - "celery"
            - "-A"
            - "api.batch.celery_app"
            - "worker"
            - "--loglevel=info"
            - "--concurrency=4"
          envFrom:
            - configMapRef:
                name: llmops-config
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llmops-secrets
                  key: openai-api-key
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-flower
  namespace: llmops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-flower
  template:
    metadata:
      labels:
        app: celery-flower
    spec:
      containers:
        - name: flower
          image: mher/flower:2.0
          command: ["celery", "flower", "--broker=redis://redis-service:6379/0"]
          ports:
            - containerPort: 5555
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: flower-service
  namespace: llmops
spec:
  selector:
    app: celery-flower
  ports:
    - port: 5555
      targetPort: 5555
